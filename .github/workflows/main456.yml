name: Build Quake iOS

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Hack the Mac File System
        run: |
          # Recria o ambiente exato do computador do desenvolvedor original
          sudo mkdir -p /Applications/Quake/id1
          sudo mkdir -p /Applications/Quake/rogue
          sudo mkdir -p /Applications/Quake/hipnotic
          
          # Dá permissão total para o nosso build ler essas pastas
          sudo chmod -R 777 /Applications/Quake

      - name: Find and Build
        run: |
          # Encontra o projeto e a pasta correta
          PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          PROJ_FILE=$(basename "$PROJ_PATH")
          
          cd "$PROJ_DIR"
          
          # Descobre o Scheme automaticamente
          SCHEME_NAME=$(xcodebuild -list -project "$PROJ_FILE" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          echo "Compilando: $PROJ_FILE com Scheme: $SCHEME_NAME"

          # Compila o jogo
          xcodebuild archive \
            -project "$PROJ_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip for Download
        if: always()
        run: |
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: "**/*.zip"
