name: Build Quake iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Find and Build
        run: |
          # 1. Acha onde o arquivo .xcodeproj está escondido
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJECT_DIR=$(dirname "$XCODEPROJ_PATH")
          PROJECT_NAME=$(basename "$XCODEPROJ_PATH")
          
          echo "Projeto encontrado em: $PROJECT_DIR"
          echo "Nome do arquivo: $PROJECT_NAME"
          
          # 2. Entra na pasta do projeto
          cd "$PROJECT_DIR"
          
          # 3. Descobre o Scheme automaticamente
          SCHEME=$(xcodebuild -list -project "$PROJECT_NAME" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Usando Scheme: $SCHEME"
          
          # 4. Cria a pasta id1 necessária
          mkdir -p id1
          touch id1/pak0.pak
          
          # 5. Compila de verdade
          xcodebuild archive \
            -project "$PROJECT_NAME" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip the Archive
        if: always()
        run: |
          # Procura o arquivo xcarchive e zipa
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: Quake_Ready.zip
