name: Build Quake iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create dummy pak file
        run: |
          mkdir -p ios/id1
          touch ios/id1/pak0.pak

      - name: Build for iOS
        working-directory: ios
        run: |
          # Detecta o arquivo de projeto dentro da pasta ios
          PROJECT=$(ls -d *.xcodeproj | head -n 1)
          # Pega o primeiro Scheme disponível
          SCHEME=$(xcodebuild -list -project "$PROJECT" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          echo "Compilando: $PROJECT com Scheme: $SCHEME"
          
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Zip the Archive
        working-directory: ios
        run: |
          zip -r ../Quake_Ready.zip Quake.xcarchive

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: Quake_Ready.zip
