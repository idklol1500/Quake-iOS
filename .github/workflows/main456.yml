name: Build Quake iOS

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare File System
        run: |
          # Cria absolutamente todas as pastas que o código pode pedir
          sudo mkdir -p /Applications/Quake/id1
          sudo mkdir -p /Applications/Quake/rogue
          sudo mkdir -p /Applications/Quake/hipnotic
          sudo mkdir -p /Applications/Quake/dopa
          sudo mkdir -p /Applications/Quake/music
          
          # Garante que o build tenha acesso total
          sudo chmod -R 777 /Applications/Quake

      - name: Find and Build
        run: |
          # Localiza o projeto automaticamente
          PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          PROJ_FILE=$(basename "$PROJ_PATH")
          
          cd "$PROJ_DIR"
          
          # Detecta o Scheme correto (ex: Quake-iOS)
          SCHEME_NAME=$(xcodebuild -list -project "$PROJ_FILE" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          echo "Iniciando compilação do Scheme: $SCHEME_NAME"

          xcodebuild archive \
            -project "$PROJ_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip for Download
        if: always()
        run: |
          # Procura o arquivo xcarchive e o transforma em ZIP para você baixar
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: "**/*.zip"
