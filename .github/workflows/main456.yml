name: Build Quake iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Fix Directory Structure
        run: |
          # Cria as pastas que o Xcode está procurando desesperadamente
          sudo mkdir -p /Applications/Quake/id1
          sudo mkdir -p /Applications/Quake/rogue
          sudo mkdir -p /Applications/Quake/hipnotic
          
          # Dá permissão para o robô mexer nelas
          sudo chmod -R 777 /Applications/Quake

      - name: Find and Build
        run: |
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJECT_DIR=$(dirname "$XCODEPROJ_PATH")
          PROJECT_NAME=$(basename "$XCODEPROJ_PATH")
          
          cd "$PROJECT_DIR"
          
          # Pega o Scheme (provavelmente 'Quake-iOS')
          SCHEME=$(xcodebuild -list -project "$PROJECT_NAME" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          xcodebuild archive \
            -project "$PROJECT_NAME" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty || true # O 'true' impede que ele pare se houver apenas avisos

      - name: Zip the Archive
        if: always()
        run: |
          # Procura o arquivo xcarchive e o zipa
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: Quake_Ready.zip
          
