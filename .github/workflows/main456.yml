name: Build Quake iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create dummy pak file
        run: |
          # O build pode falhar se a pasta id1 estiver vazia. 
          # Criamos um arquivo vazio apenas para o compilador não reclamar.
          mkdir -p id1
          touch id1/pak0.pak

      - name: Build for iOS
        run: |
          xcodebuild archive \
            -project Quake.xcodeproj \
            -scheme Quake \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
