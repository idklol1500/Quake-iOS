name: Build Quake iOS

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Compile
        run: |
          # Acha o projeto na pasta ios ou em qualquer lugar
          X_PROJECT=$(find . -name "*.xcodeproj" -print -quit)
          X_DIR=$(dirname "$X_PROJECT")
          
          cd "$X_DIR"
          
          # Cria pastas fantasmas para não dar erro de arquivo faltando
          mkdir -p id1 rogue hipnotic
          
          # Pega o primeiro Scheme
          X_SCHEME=$(xcodebuild -list -project *.xcodeproj | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          echo "Compilando $X_SCHEME..."

          # Comando de build direto, sem filtros, para vermos o erro real
          xcodebuild archive \
            -project *.xcodeproj \
            -scheme "$X_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip and Upload
        if: always()
        run: |
          # Procura o arquivo xcarchive e o zipa onde quer que ele esteja
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: "**/*.zip"
