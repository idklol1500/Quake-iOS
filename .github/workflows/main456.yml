name: Build Quake iOS

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Find and Build
        run: |
          # Acha o projeto não importa onde ele esteja
          XCODEPROJ=$(find . -name "*.xcodeproj" -print -quit)
          PROJECT_DIR=$(dirname "$XCODEPROJ")
          
          cd "$PROJECT_DIR"
          
          # Pega o primeiro Scheme que aparecer
          SCHEME=$(xcodebuild -list -project *.xcodeproj | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          echo "Compilando $SCHEME em $PROJECT_DIR..."

          # Build ignorando erros de arquivos de assets faltando
          xcodebuild archive \
            -project *.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      - name: Prepare Artifact
        run: |
          # Procura o arquivo .xcarchive e zipa ele na raiz do projeto
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-IPA
          path: Quake_Ready.zip
          if-no-files-found: error
