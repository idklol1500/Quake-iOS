name: Build Quake iOS

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Find and Build
        run: |
          # 1. Acha o arquivo .xcodeproj em qualquer lugar do repositório
          PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          PROJ_FILE=$(basename "$PROJ_PATH")
          
          if [ -z "$PROJ_PATH" ]; then
            echo "ERRO: Nenhum arquivo .xcodeproj encontrado!"
            exit 1
          fi
          
          echo "Projeto encontrado em: $PROJ_DIR"
          cd "$PROJ_DIR"
          
          # 2. Descobre o Scheme real (evita o erro 65)
          SCHEME_NAME=$(xcodebuild -list -project "$PROJ_FILE" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Scheme detectado: $SCHEME_NAME"

          # 3. Cria pastas necessárias para não dar erro de arquivo faltando
          mkdir -p id1 rogue hipnotic

          # 4. Compila
          xcodebuild archive \
            -project "$PROJ_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip for Download
        if: always()
        run: |
          # Procura o arquivo gerado e zipa na raiz para o upload
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: "**/*.zip"
