name: Build Quake iOS

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: List Schemes and Build
        run: |
          # 1. Entra na pasta ios onde o projeto realmente está
          cd ios
          
          # 2. Lista os schemes para o log (ajuda a gente a diagnosticar se falhar)
          xcodebuild -list -project Quake.xcodeproj
          
          # 3. Pega o primeiro nome de Scheme que aparecer na lista
          SCHEME_NAME=$(xcodebuild -list -project Quake.xcodeproj | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "O Scheme detectado foi: $SCHEME_NAME"
          
          # 4. Compila usando o nome detectado automaticamente
          xcodebuild archive \
            -project Quake.xcodeproj \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip and Upload
        if: always()
        run: |
          # Procura o arquivo xcarchive (que é uma pasta) e transforma em ZIP
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: "**/*.zip"
