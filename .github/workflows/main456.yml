name: Build Quake iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create dummy pak file
        run: |
          mkdir -p ios/id1
          touch ios/id1/pak0.pak

      - name: Build for iOS
        working-directory: ios
        run: |
          # Limpa o build anterior para evitar conflitos
          xcodebuild clean -project Quake.xcodeproj -configuration Release
          
          # Tenta compilar o arquivo de projeto diretamente
          xcodebuild archive \
            -project Quake.xcodeproj \
            -scheme "Quake" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Quake.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Zip the Archive
        if: always()
        run: |
          # Procura o arquivo xcarchive onde quer que ele tenha sido criado
          find . -name "*.xcarchive" -exec zip -r Quake_Ready.zip {} +

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Build
          path: Quake_Ready.zip
