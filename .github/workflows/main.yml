name: Build Quake iOS
on: 
  workflow_dispatch: # Permite rodar manualmente pelo botão no app/site

jobs:
  build:
    runs-on: macos-13 # Usando o macOS 13 para melhor compatibilidade com ports antigos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Baixa o motor do Quake e dependências

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_14.3.1.app # Versão estável para ports

      - name: Build App
        run: |
          mkdir -p build
          xcodebuild -project "Quake/Quake.xcodeproj" \
                     -scheme "Quake-iOS" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quake-iOS-Binary
          path: build/Build/Products/Release-iphoneos/*.app
